<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat Groq + OpenRouter Vision</title>
<style>
  body { font-family: system-ui, sans-serif; background:#0f1115; color:#e6e6e6; margin:0; display:flex; flex-direction:column; height:100vh; }
  header { padding:12px 16px; background:#1a1d24; font-weight:600; }
  #chat { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
 .msg { padding:10px 14px; border-radius:12px; max-width:80%; }
 .user { background:#2d6cdf; align-self:flex-end; }
 .ai { background:#262a33; align-self:flex-start; }
 .ai img { max-width:200px; border-radius:8px; margin-top:8px; }
  footer { padding:12px; background:#1a1d24; display:flex; gap:8px; }
  input, button, select { padding:10px; border-radius:8px; border:none; }
  input { flex:1; background:#262a33; color:#e6e6e6; }
  button { background:#2d6cdf; color:white; cursor:pointer; }
  button:disabled { opacity:0.5; }
</style>
</head>
<body>
<header>AI Chat - Groq Text + OpenRouter Vision</header>

<div id="chat"></div>

<footer>
  <select id="mode">
    <option value="groq">Groq Text</option>
    <option value="vision">OpenRouter Vision</option>
  </select>
  <input type="file" id="imgInput" accept="image/*" style="display:none">
  <button id="btnImg">📎</button>
  <input type="text" id="prompt" placeholder="Ketik pesan...">
  <button id="send">Kirim</button>
</footer>

<script>
// ⚠️ JANGAN UPLOAD KE GITHUB/PUBLIC. KEY BISA DICURI ORANG
const GROQ_API_KEY = "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";
const OR_API_KEY = "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";
const OR_VISION_MODEL = "google/gemini-2.0-flash-exp:free";

const chatEl = document.getElementById('chat');
const promptEl = document.getElementById('prompt');
const sendBtn = document.getElementById('send');
const modeEl = document.getElementById('mode');
const imgInput = document.getElementById('imgInput');
const btnImg = document.getElementById('btnImg');
let imageBase64 = null;

btnImg.onclick = () => imgInput.click();
imgInput.onchange = e => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = () => { imageBase64 = reader.result; addMsg('user', `<i>Gambar dilampirkan</i><br><img src="${imageBase64}">`); }
  reader.readAsDataURL(file);
}

modeEl.onchange = () => {
  btnImg.style.display = modeEl.value === 'vision'? 'block' : 'none';
}
modeEl.dispatchEvent(new Event('change'));

function addMsg(role, html){
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = html;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

async function callGroq(text){
  const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${GROQ_API_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: "llama-3.1-8b-instant",
      messages: [{role: "user", content: text}]
    })
  });
  const data = await res.json();
  return data.choices[0].message.content;
}

async function callOpenRouterVision(text, img){
  const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${OR_API_KEY}`,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: OR_VISION_MODEL,
      messages: [{
        role: "user",
        content: [
          {type: "text", text: text},
          {type: "image_url", image_url: {url: img}}
        ]
      }]
    })
  });
  const data = await res.json();
  return data.choices[0].message.content;
}

sendBtn.onclick = async () => {
  const text = promptEl.value.trim();
  if(!text &&!imageBase64) return;
  sendBtn.disabled = true;

  addMsg('user', text || '<i>Analisa gambar ini</i>');
  promptEl.value = '';

  addMsg('ai', '<i>Mengetik...</i>');
  const loadingEl = chatEl.lastChild;

  try{
    let reply;
    if(modeEl.value === 'groq'){
      reply = await callGroq(text);
    } else {
      if(!imageBase64) throw new Error("Upload gambar dulu untuk mode Vision");
      reply = await callOpenRouterVision(text || "Jelaskan gambar ini", imageBase64);
      imageBase64 = null;
    }
    loadingEl.innerHTML = reply;
  } catch(err){
    loadingEl.innerHTML = "Error: " + err.message;
  }
  sendBtn.disabled = false;
}

promptEl.addEventListener('keypress', e => { if(e.key === 'Enter') sendBtn.click(); })
</script>
</body>
</html>
